[build-system]
requires = ["setuptools>=82.0.1"]
build-backend = "setuptools.build_meta"

[project]
name = "alextym-backend"
version = "0.1.0"
description = "FastAPI backend for alextym."
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115,<1.0",
    "openai>=2.0,<3.0",
    "qdrant-client>=1.16,<2.0",
    "resend>=2.0,<3.0",
    "uvicorn[standard]>=0.48.0,<1.0",
]

[project.optional-dependencies]
dev = [
    "httpx>=0.27,<1.0",
    "pytest>=9.0.3,<10.0",
    "ruff>=0.8,<1.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["app*", "scripts*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
