global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: portfolio-backend-local
    metrics_path: /internal/metrics
    scheme: http
    authorization:
      type: Bearer
      credentials: local-dev-metrics-token
    static_configs:
      - targets:
          - host.docker.internal:8000
        labels:
          environment: local
          service: portfolio-backend
