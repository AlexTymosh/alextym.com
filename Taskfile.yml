version: "3"

vars:
  BACKEND_PORT: "8000"
  FRONTEND_PORT: "3000"
  OBSERVABILITY_COMPOSE: "{{.ROOT_DIR}}/infra/observability/docker-compose.yml"

env:
  UV_CACHE_DIR: "{{.ROOT_DIR}}/.tmp/uv-cache"
  UV_PROJECT_ENVIRONMENT: "{{.ROOT_DIR}}/.tmp/backend-venv"

tasks:
  default:
    desc: Show available tasks.
    cmds:
      - task --list

  ci:
    desc: Run all free checks expected before push or pull request with a summary.
    silent: true
    cmds:
      - node scripts/run-ci.mjs

  pre-pr:
    desc: Apply safe formatting, then run the full free pre-PR checks.
    cmds:
      - task: format
      - task: ci

  format:
    desc: Apply all available project formatters.
    cmds:
      - task: backend:format

  dev:
    desc: Sync dependencies, then run backend and frontend dev servers.
    cmds:
      - task: backend:sync
      - task: frontend:install
      - task: dev:servers

  dev:telegram:
    desc: Run local dev servers and local Telegram polling for handoff button testing.
    cmds:
      - task: telegram:preflight
      - task: backend:sync
      - task: frontend:install
      - task: dev:telegram:servers

  telegram:preflight:
    desc: Validate local Telegram polling requirements before starting dev servers.
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass
        -File "{{.ROOT_DIR}}/scripts/telegram-dev-preflight.ps1"

  telegram:poller:
    desc: Receive Telegram updates through getUpdates and forward them to the local backend.
    dir: backend
    cmds:
      - >-
        uv run python ../scripts/telegram-dev-poller.py
        --backend-port {{.BACKEND_PORT}}

  smoke:
    desc: Check the local backend and frontend dev servers.
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass
        -File "{{.ROOT_DIR}}/scripts/smoke.ps1"
        -BackendPort {{.BACKEND_PORT}}
        -FrontendPort {{.FRONTEND_PORT}}

  repo:diff-check:
    desc: Check staged and unstaged diff whitespace.
    cmds:
      - git diff --check

  repo:cyrillic-check:
    desc: Prevent raw Cyrillic outside .ru documentation.
    cmds:
      - node scripts/check-no-raw-cyrillic.mjs

  repo:check:
    desc: Run repository hygiene checks.
    cmds:
      - task: repo:diff-check
      - task: repo:cyrillic-check

  config:check:
    desc: Validate shared public project configuration.
    cmds:
      - node scripts/check-project-config.mjs

  wizard:check:
    desc: Validate the local project setup wizard.
    cmds:
      - node scripts/check-setup-wizard.mjs

  setup:wizard:
    desc: Edit shared public project configuration through the local GUI setup wizard.
    cmds:
      - node scripts/setup-project-config-gui.mjs {{.CLI_ARGS}}

  setup:wizard:cli:
    desc: Edit shared public project configuration through the CLI setup wizard.
    cmds:
      - node scripts/setup-project-config.mjs {{.CLI_ARGS}}

  deployment:check:
    desc: Validate local and production deployment routing configuration.
    cmds:
      - node scripts/check-deployment-config.mjs

  stop:
    desc: Stop local dev servers on the project ports.
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass
        -File "{{.ROOT_DIR}}/scripts/stop-dev.ps1"
        -BackendPort {{.BACKEND_PORT}}
        -FrontendPort {{.FRONTEND_PORT}}

  backend:sync:
    desc: Sync backend dependencies with uv.
    dir: backend
    cmds:
      - uv sync --extra dev

  backend:dev:
    desc: Run the FastAPI backend dev server.
    dir: backend
    cmds:
      - >-
        uv run uvicorn app.main:app --reload --host 127.0.0.1
        --port {{.BACKEND_PORT}}

  backend:lint:
    desc: Run Ruff lint checks.
    dir: backend
    cmds:
      - uv run ruff check .

  backend:format-check:
    desc: Check backend formatting.
    dir: backend
    cmds:
      - uv run ruff format --check .

  backend:format:
    desc: Apply safe Ruff fixes and format backend code.
    dir: backend
    cmds:
      - uv run ruff check . --fix
      - uv run ruff format .

  backend:compile:
    desc: Compile backend Python modules to catch syntax errors early.
    dir: backend
    cmds:
      - uv run python -m compileall app scripts tests

  backend:test:
    desc: Run backend tests.
    dir: backend
    cmds:
      - uv run python -m pytest

  rag:extract-resume:
    desc: Build generated RAG sources from the canonical resume markdown.
    dir: backend
    cmds:
      - uv run python -m scripts.extract_resume_rag_source

  rag:check:
    desc: Run free deterministic RAG checks without live OpenAI or Qdrant.
    cmds:
      - task: rag:extract-resume
      - task: rag:eval:contract

  rag:eval:contract:
    desc: Run stateless deterministic contract evals without live OpenAI or Qdrant.
    dir: backend
    env:
      LOG_LEVEL: WARNING
    cmds:
      - >-
        uv run python -m scripts.run_chat_evals
        --suite contract
        --mode isolated
        --report-json "../.tmp/evals/contract.json"

  rag:ingest:
    desc: Rebuild Qdrant vectors from the canonical structured resume source.
    cmds:
      - task: rag:ingest:generated

  rag:ingest:generated:
    desc: Rebuild Qdrant vectors from generated structured resume chunks.
    dir: backend
    env:
      UV_CACHE_DIR: "{{.ROOT_DIR}}/.tmp/uv-cache-rag"
      UV_PROJECT_ENVIRONMENT: "{{.ROOT_DIR}}/.tmp/backend-rag-venv"
    cmds:
      - uv run python -m scripts.extract_resume_rag_source
      - >-
        uv run --isolated --env-file .env
        python -m scripts.ingest_generated_resume_chunks

  rag:eval:free:
    desc: Run local before/after contract eval cycle without live OpenAI/Qdrant.
    dir: backend
    env:
      LOG_LEVEL: WARNING
    cmds:
      - >-
        uv run python -m scripts.run_chat_eval_cycle
        --suite contract
        --mode isolated
        --before "../.tmp/evals/contract-before.json"
        --after "../.tmp/evals/contract-after.json"
        --comparison "../.tmp/evals/contract-comparison.md"

  rag:eval:paid:
    desc: Run paid live RAG eval cycle with OpenAI/Qdrant.
    dir: backend
    env:
      UV_CACHE_DIR: "{{.ROOT_DIR}}/.tmp/uv-cache-rag"
      UV_PROJECT_ENVIRONMENT: "{{.ROOT_DIR}}/.tmp/backend-rag-venv"
    cmds:
      - >-
        uv run --env-file .env python -m scripts.run_chat_eval_cycle
        --suite rag_quality
        --mode live
        --before "../.tmp/evals/rag-before.json"
        --after "../.tmp/evals/rag-after.json"
        --comparison "../.tmp/evals/rag-comparison.md"

  rag:eval:generated:
    desc: Compare structured generated-RAG quality before and after ingestion.
    dir: backend
    env:
      UV_CACHE_DIR: "{{.ROOT_DIR}}/.tmp/uv-cache-rag"
      UV_PROJECT_ENVIRONMENT: "{{.ROOT_DIR}}/.tmp/backend-rag-venv"
    cmds:
      - >-
        uv run --env-file .env python -m scripts.run_chat_eval_cycle
        --cases evals/chat_eval_cases_generated_rag.json
        --suite rag_generated_quality
        --mode live
        --before "../.tmp/evals/generated-rag-before.json"
        --after "../.tmp/evals/generated-rag-after.json"
        --comparison "../.tmp/evals/generated-rag-comparison.md"
        --allow-failures

  rag:eval:retrieval:
    desc: Compare generated-RAG retrieval quality before and after changes.
    dir: backend
    env:
      UV_CACHE_DIR: "{{.ROOT_DIR}}/.tmp/uv-cache-rag"
      UV_PROJECT_ENVIRONMENT: "{{.ROOT_DIR}}/.tmp/backend-rag-venv"
    cmds:
      - >-
        uv run --env-file .env python -m scripts.run_retrieval_evals
        --cases evals/retrieval_eval_cases_generated_rag.json
        --suite rag_retrieval_quality
        --before "../.tmp/evals/retrieval-rag-before.json"
        --after "../.tmp/evals/retrieval-rag-after.json"
        --comparison "../.tmp/evals/retrieval-rag-comparison.md"
        --allow-failures

  rag:eval:compare:
    desc: Compare two eval JSON reports and write a Markdown table.
    dir: backend
    env:
      UV_CACHE_DIR: "{{.ROOT_DIR}}/.tmp/uv-cache-rag"
      UV_PROJECT_ENVIRONMENT: "{{.ROOT_DIR}}/.tmp/backend-rag-venv"
    cmds:
      - >-
        uv run python -m scripts.compare_eval_reports
        --before "{{.BEFORE}}"
        --after "{{.AFTER}}"
        --output
        '{{.OUTPUT | default "../.tmp/evals/eval-comparison.md"}}'

  backend:check:
    desc: Run all backend checks.
    cmds:
      - task: backend:sync
      - task: backend:lint
      - task: backend:format-check
      - task: backend:compile
      - task: backend:test

  frontend:install:
    desc: Install frontend dependencies from package-lock.json.
    dir: frontend
    cmds:
      - npm ci

  frontend:dev:
    desc: Run the Next.js frontend dev server.
    dir: frontend
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass
        -File "{{.ROOT_DIR}}/scripts/frontend-dev.ps1"
        -BackendPort {{.BACKEND_PORT}}
        -FrontendPort {{.FRONTEND_PORT}}

  frontend:lint:
    desc: Run frontend ESLint checks.
    dir: frontend
    cmds:
      - npm run lint

  frontend:typecheck:
    desc: Run frontend TypeScript type checks.
    dir: frontend
    cmds:
      - npm run typecheck

  frontend:resume-check:
    desc: Check resume parser and prevent RAG-only content leaks.
    dir: frontend
    cmds:
      - npm run check:resume

  frontend:build:
    desc: Build the frontend.
    dir: frontend
    cmds:
      - npm run build

  frontend:e2e:install:
    desc: Install Playwright browser binaries for local frontend E2E tests.
    dir: frontend
    cmds:
      - npm run e2e:install

  frontend:e2e:install:ci:
    desc: Install Playwright browser binaries and Linux dependencies for CI.
    dir: frontend
    cmds:
      - npx playwright install --with-deps chromium

  frontend:e2e:
    desc: Run frontend Playwright E2E tests.
    dir: frontend
    cmds:
      - npm run e2e

  frontend:e2e:built:
    desc: Run frontend Playwright E2E tests against the existing production build.
    dir: frontend
    env:
      PLAYWRIGHT_USE_EXISTING_BUILD: "true"
    cmds:
      - npm run e2e

  frontend:check:
    desc: Run all frontend checks for local development.
    cmds:
      - task: frontend:install
      - task: frontend:lint
      - task: frontend:typecheck
      - task: frontend:resume-check
      - task: frontend:build
      - task: frontend:e2e:install
      - task: frontend:e2e:built

  frontend:check:ci:
    desc: Run all frontend checks on Linux CI runners.
    cmds:
      - task: frontend:install
      - task: frontend:lint
      - task: frontend:typecheck
      - task: frontend:resume-check
      - task: frontend:build
      - task: frontend:e2e:install:ci
      - task: frontend:e2e:built

  docker:build:
    desc: Build the backend Docker image.
    cmds:
      - docker build -f backend/Dockerfile -t alextym-backend .

  obs:config:
    desc: Validate the local observability Docker Compose config.
    cmds:
      - >-
        docker compose -f "{{.OBSERVABILITY_COMPOSE}}" config

  obs:up:
    desc: Start local Prometheus and Grafana.
    cmds:
      - task: obs:config
      - >-
        docker compose -f "{{.OBSERVABILITY_COMPOSE}}" up -d

  obs:down:
    desc: Stop local Prometheus and Grafana.
    cmds:
      - >-
        docker compose -f "{{.OBSERVABILITY_COMPOSE}}" down

  obs:logs:
    desc: Follow local Prometheus and Grafana logs.
    cmds:
      - >-
        docker compose -f "{{.OBSERVABILITY_COMPOSE}}" logs -f

  obs:restart:
    desc: Restart local Prometheus and Grafana.
    cmds:
      - task: obs:down
      - task: obs:up

  dev:servers:
    internal: true
    deps:
      - backend:dev
      - frontend:dev

  dev:telegram:servers:
    internal: true
    deps:
      - backend:dev
      - frontend:dev
      - telegram:poller
