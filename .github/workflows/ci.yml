name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  project:
    name: project
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: "3.51.1"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run repository hygiene checks
        run: task repo:check

      - name: Run project config checks
        run: task config:check

      - name: Run setup wizard checks
        run: task wizard:check

      - name: Run deployment config checks
        run: task deployment:check

  backend:
    name: backend
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: "3.51.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: backend/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.16"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Run backend checks
        run: task backend:check

  frontend:
    name: frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: "3.51.1"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run frontend checks
        run: task frontend:check:ci

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  rag:
    name: rag
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: "3.51.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: backend/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.16"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Run free RAG checks
        run: task rag:check

  docker:
    name: docker
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: "3.51.1"

      - name: Build backend Docker image
        run: task docker:build
